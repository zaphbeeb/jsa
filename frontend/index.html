<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Parser</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
</head>
<body>
    <div class="glass-bg"></div>
    <div class="glass-container">
        <header>
            <h1>AI Resume Parser <span class="badge">PRO</span></h1>
            <p>Extract skills and experience instantly with the Gemini AI.</p>
        </header>

        <main>
            <div class="split-layout">
                <div class="left-panel">
                    <div class="card import-card">
                        <h2>Import Resume</h2>
                        <div class="tabs">
                            <button class="tab active" data-tab="upload">Upload File</button>
                            <button class="tab" data-tab="paste">Paste Text</button>
                        </div>
                        
                        <div id="upload-tab" class="tab-content active">
                            <div class="drop-zone" id="drop-zone">
                                <span class="icon">📄</span>
                                <p>Drag & Drop a PDF, DOCX, or TXT file here</p>
                                <span>or</span>
                                <input type="file" id="file-input" accept=".pdf,.docx,.doc,.txt" hidden>
                                <button class="btn secondary" onclick="document.getElementById('file-input').click()">Browse Files</button>
                            </div>
                        </div>

                        <div id="paste-tab" class="tab-content hidden">
                            <textarea id="text-input" placeholder="Paste resume text here..." rows="8"></textarea>
                        </div>

                        <button id="process-btn" class="btn primary full-width">Extract Skills & Experience</button>
                        <div id="loading" class="hidden">
                            <div class="spinner"></div>
                            <p>Analyzing with AI...</p>
                        </div>
                    </div>

                    <div class="card saved-profiles-card">
                        <h2>Saved Profiles</h2>
                        <ul id="profiles-list" class="profiles-list">
                            <!-- Profiles populated via JS -->
                        </ul>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="card result-card">
                        <div class="result-header">
                            <h2>Parsed Result</h2>
                            <div class="actions">
                                <button id="edit-btn" class="btn secondary small hidden">Edit Markdown</button>
                                <button id="save-btn" class="btn primary small hidden">Save Profile</button>
                            </div>
                        </div>
                        
                        <div id="save-dialog" class="hidden">
                            <input type="text" id="profile-name" class="input-light" placeholder="Enter Candidate Name">
                            <button id="confirm-save-btn" class="btn success small">Confirm</button>
                            <button id="cancel-save-btn" class="btn danger small">Cancel</button>
                        </div>

                        <div class="result-body">
                            <div id="result-content" class="markdown-body">
                                <div class="empty-state">
                                    <p>No result yet. Upload a resume to begin.</p>
                                </div>
                            </div>
                            <textarea id="edit-area" class="hidden"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
